<!DOCTYPE html>
<html>
<head>
<title>Meu Jogo</title>
<style>
  body {
    text-align: center;
    font-family: Arial;
  }
  #botao {
    padding: 20px;
    font-size: 20px;
  }
</style>
</head>

<body>

<h1>Jogo de Clique</h1>
<p>Pontos: <span id="pontos">0</span></p>

<button id="botao">Clique aqui!</button>

<script>
let pontos = 0;

document.getElementById("botao").onclick = function() {
  pontos++;
  document.getElementById("pontos").textContent = pontos;
};
</script>

</body>
</html>
