<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:800px;
height:600px;
margin:auto;
background:black;
border:2px solid white;
overflow:hidden;
}

#player{
position:absolute;
bottom:20px;
left:370px;
width:60px;
height:20px;
background:cyan;
}

.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
top:0;
}

.bullet{
position:absolute;
width:6px;
height:15px;
background:yellow;
}

</style>
</head>

<body>

<h1>SPACE SHOOTER</h1>

<div id="game">
<div id="player"></div>
</div>

<p>Score: <span id="score">0</span></p>

<script>

let game = document.getElementById("game")
let player = document.getElementById("player")
let score = 0

let bullets = []
let enemies = []

// MOVIMENTO DA NAVE
document.addEventListener("keydown",function(e){

let left = player.offsetLeft

if(e.key === "ArrowLeft"){
player.style.left = Math.max(0,left-20)+"px"
}

if(e.key === "ArrowRight"){
player.style.left = Math.min(740,left+20)+"px"
}

if(e.key === " "){
shoot()
}

})

// TIRO
function shoot(){

let bullet = document.createElement("div")
bullet.classList.add("bullet")

bullet.style.left = (player.offsetLeft+27)+"px"
bullet.style.bottom = "50px"

game.appendChild(bullet)

bullets.push(bullet)

}

// CRIAR INIMIGOS
function spawnEnemy(){

let enemy = document.createElement("div")
enemy.classList.add("enemy")

enemy.style.left = Math.random()*760+"px"

game.appendChild(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,1200)

// LOOP DO JOGO
function gameLoop(){

// mover tiros
bullets.forEach((bullet,index)=>{

bullet.style.top = (bullet.offsetTop-10)+"px"

if(bullet.offsetTop < 0){
bullet.remove()
bullets.splice(index,1)
}

})

// mover inimigos
enemies.forEach((enemy,eIndex)=>{

enemy.style.top = (enemy.offsetTop+3)+"px"

// colisão
bullets.forEach((bullet,bIndex)=>{

if(
bullet.offsetLeft < enemy.offsetLeft+40 &&
bullet.offsetLeft+6 > enemy.offsetLeft &&
bullet.offsetTop < enemy.offsetTop+40 &&
bullet.offsetTop+15 > enemy.offsetTop
){

enemy.remove()
bullet.remove()

enemies.splice(eIndex,1)
bullets.splice(bIndex,1)

score++
document.getElementById("score").innerText = score

}

})

})

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
