<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:100%;
max-width:800px;
height:500px;
margin:auto;
border:2px solid white;
overflow:hidden;
background:black;
}

/* estrelas */

.star{
position:absolute;
background:white;
border-radius:50%;
}

/* nave */

#player{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-bottom:60px solid cyan;
}

/* tiro */

.bullet{
position:absolute;
width:6px;
height:15px;
background:yellow;
}

/* inimigos */

.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
}

/* botões mobile */

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-around;
}

button{
font-size:25px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

</style>
</head>

<body>

<h2>SPACE SHOOTER</h2>

<div id="game">
<div id="player"></div>
</div>

<p>
Score: <span id="score">0</span> |
Vidas: <span id="lives">3</span>
</p>

<div id="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="shoot()">🔫</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")

let playerX = game.offsetWidth/2
let score = 0
let lives = 3

let bullets = []
let enemies = []
let stars = []

// estrelas parallax

function createStars(){

for(let i=0;i<80;i++){

let star=document.createElement("div")
star.className="star"

star.x=Math.random()*game.offsetWidth
star.y=Math.random()*500
star.layer=Math.floor(Math.random()*3)+1

star.style.width=star.layer+"px"
star.style.height=star.layer+"px"

star.style.left=star.x+"px"
star.style.top=star.y+"px"

game.appendChild(star)

stars.push(star)

}

}

createStars()

function moveStars(){

stars.forEach(star=>{

star.y+=star.layer

if(star.y>500){
star.y=0
star.x=Math.random()*game.offsetWidth
}

star.style.top=star.y+"px"

})

}

// controles

function moveLeft(){

playerX-=25
playerX=Math.max(0,playerX)

player.style.left=playerX+"px"

}

function moveRight(){

playerX+=25
playerX=Math.min(game.offsetWidth-60,playerX)

player.style.left=playerX+"px"

}

// tiro

function shoot(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.x=playerX+27
bullet.y=430

bullet.style.left=bullet.x+"px"
bullet.style.top=bullet.y+"px"

game.appendChild(bullet)

bullets.push(bullet)

}

// inimigos

function spawnEnemy(){

let enemy=document.createElement("div")
enemy.className="enemy"

enemy.x=Math.random()*(game.offsetWidth-40)
enemy.y=0

enemy.style.left=enemy.x+"px"
enemy.style.top=enemy.y+"px"

game.appendChild(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,1200)

// loop

function update(){

moveStars()

bullets.forEach((b,i)=>{

b.y-=10
b.style.top=b.y+"px"

if(b.y<0){
b.remove()
bullets.splice(i,1)
}

})

enemies.forEach((e,ei)=>{

e.y+=3
e.style.top=e.y+"px"

if(e.y>470){

lives--
document.getElementById("lives").innerText=lives

e.remove()
enemies.splice(ei,1)

if(lives<=0){
alert("GAME OVER")
location.reload()
}

}

bullets.forEach((b,bi)=>{

if(
b.x < e.x+40 &&
b.x+6 > e.x &&
b.y < e.y+40 &&
b.y+15 > e.y
){

e.remove()
b.remove()

enemies.splice(ei,1)
bullets.splice(bi,1)

score++
document.getElementById("score").innerText=score

}

})

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
