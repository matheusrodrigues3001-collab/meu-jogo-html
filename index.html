<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:800px;
height:600px;
margin:auto;
background:black;
border:2px solid white;
overflow:hidden;
}

#player{
position:absolute;
bottom:10px;
left:370px;
width:60px;
height:20px;
background:cyan;
}

.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
}

.bullet{
position:absolute;
width:6px;
height:15px;
background:yellow;
}

</style>
</head>

<body>

<h1>SPACE SHOOTER</h1>

<div id="game">
<div id="player"></div>
</div>

<p>Score: <span id="score">0</span></p>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")
let score = 0

let playerX = 370

let bullets = []
let enemies = []

// MOVIMENTO
document.addEventListener("keydown", e => {

if(e.key === "ArrowLeft"){
playerX -= 20
}

if(e.key === "ArrowRight"){
playerX += 20
}

if(e.code === "Space"){
shoot()
}

playerX = Math.max(0,Math.min(740,playerX))
player.style.left = playerX + "px"

})

// TIRO
function shoot(){

let bullet = document.createElement("div")
bullet.className = "bullet"

bullet.x = playerX + 27
bullet.y = 540

bullet.style.left = bullet.x + "px"
bullet.style.top = bullet.y + "px"

game.appendChild(bullet)

bullets.push(bullet)

}

// INIMIGOS
function spawnEnemy(){

let enemy = document.createElement("div")
enemy.className = "enemy"

enemy.x = Math.random()*760
enemy.y = 0

enemy.style.left = enemy.x + "px"
enemy.style.top = enemy.y + "px"

game.appendChild(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,1200)

// LOOP
function update(){

// tiros
bullets.forEach((b,i)=>{

b.y -= 10
b.style.top = b.y + "px"

if(b.y < 0){
b.remove()
bullets.splice(i,1)
}

})

// inimigos
enemies.forEach((e,ei)=>{

e.y += 3
e.style.top = e.y + "px"

// colisão
bullets.forEach((b,bi)=>{

if(
b.x < e.x + 40 &&
b.x + 6 > e.x &&
b.y < e.y + 40 &&
b.y + 15 > e.y
){

e.remove()
b.remove()

enemies.splice(ei,1)
bullets.splice(bi,1)

score++
document.getElementById("score").innerText = score

}

})

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
