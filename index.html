<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WW2 Battle</title>

<style>

body{
margin:0;
background:#2b2b2b;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#game{
position:relative;
width:100%;
max-width:800px;
height:500px;
margin:auto;
background:#3a5f2b;
border:3px solid white;
overflow:hidden;
}

/* jogador */

#player{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:40px;
height:40px;
background:green;
border-radius:5px;
}

/* tiro */

.bullet{
position:absolute;
width:5px;
height:15px;
background:yellow;
}

/* inimigo */

.enemy{
position:absolute;
width:35px;
height:35px;
background:brown;
}

/* explosão */

.explosion{
position:absolute;
width:40px;
height:40px;
background:orange;
border-radius:50%;
}

/* controles mobile */

#controls{
position:fixed;
bottom:15px;
width:100%;
display:flex;
justify-content:space-around;
}

button{
font-size:22px;
padding:15px 25px;
background:#111;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<h2>WW2 BATTLE</h2>

<div id="game">
<div id="player"></div>
</div>

<p>
Score: <span id="score">0</span> |
Vidas: <span id="lives">3</span>
</p>

<div id="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="shoot()">🔫</button>
<button onclick="moveRight()">➡️</button>
</div>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")

let playerX = game.offsetWidth/2
let bullets=[]
let enemies=[]

let score=0
let lives=3

// mover

function moveLeft(){

playerX-=25
playerX=Math.max(0,playerX)

player.style.left=playerX+"px"

}

function moveRight(){

playerX+=25
playerX=Math.min(game.offsetWidth-40,playerX)

player.style.left=playerX+"px"

}

// tiro

function shoot(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.x=playerX+18
bullet.y=430

bullet.style.left=bullet.x+"px"
bullet.style.top=bullet.y+"px"

game.appendChild(bullet)

bullets.push(bullet)

}

// inimigos

function spawnEnemy(){

let enemy=document.createElement("div")
enemy.className="enemy"

enemy.x=Math.random()*(game.offsetWidth-35)
enemy.y=0

enemy.style.left=enemy.x+"px"
enemy.style.top=enemy.y+"px"

game.appendChild(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,1200)

// explosão

function explosion(x,y){

let exp=document.createElement("div")
exp.className="explosion"

exp.style.left=x+"px"
exp.style.top=y+"px"

game.appendChild(exp)

setTimeout(()=>{
exp.remove()
},300)

}

// loop

function update(){

bullets.forEach((b,i)=>{

b.y-=10
b.style.top=b.y+"px"

if(b.y<0){
b.remove()
bullets.splice(i,1)
}

})

enemies.forEach((e,ei)=>{

e.y+=3
e.style.top=e.y+"px"

if(e.y>470){

lives--
document.getElementById("lives").innerText=lives

e.remove()
enemies.splice(ei,1)

if(lives<=0){
alert("GAME OVER")
location.reload()
}

}

bullets.forEach((b,bi)=>{

if(
b.x < e.x+35 &&
b.x+5 > e.x &&
b.y < e.y+35 &&
b.y+15 > e.y
){

explosion(e.x,e.y)

b.remove()
e.remove()

bullets.splice(bi,1)
enemies.splice(ei,1)

score++

document.getElementById("score").innerText=score

}

})

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
