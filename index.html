<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:800px;
height:600px;
margin:auto;
border:2px solid white;
overflow:hidden;
background:black;
}

/* estrelas */

.star{
position:absolute;
background:white;
border-radius:50%;
}

/* nave */

#player{
position:absolute;
bottom:20px;
left:370px;
width:0;
height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-bottom:60px solid cyan;
}

/* tiro */

.bullet{
position:absolute;
width:6px;
height:15px;
background:yellow;
}

/* inimigos */

.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
}

/* explosão */

.explosion{
position:absolute;
width:40px;
height:40px;
background:orange;
border-radius:50%;
}

</style>
</head>

<body>

<h1>SPACE SHOOTER</h1>

<div id="game">
<div id="player"></div>
</div>

<p>
Score: <span id="score">0</span> |
Vidas: <span id="lives">3</span>
</p>

<!-- SONS -->

<audio id="shootSound" src="https://assets.mixkit.co/active_storage/sfx/2967/2967-preview.mp3"></audio>
<audio id="explosionSound" src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3"></audio>
<audio id="gameoverSound" src="https://assets.mixkit.co/active_storage/sfx/1114/1114-preview.mp3"></audio>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")

let playerX = 370
let score = 0
let lives = 3

let bullets = []
let enemies = []
let stars = []

// ⭐ criar estrelas parallax

function createStars(){

for(let i=0;i<120;i++){

let star = document.createElement("div")
star.className="star"

star.x=Math.random()*800
star.y=Math.random()*600

star.layer=Math.floor(Math.random()*3)+1

let size = star.layer

star.style.width=size+"px"
star.style.height=size+"px"

star.style.left=star.x+"px"
star.style.top=star.y+"px"

game.appendChild(star)

stars.push(star)

}

}

createStars()

function moveStars(){

stars.forEach(star=>{

star.y += star.layer

if(star.y>600){
star.y=0
star.x=Math.random()*800
}

star.style.top=star.y+"px"

})

}

// movimento nave

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") playerX-=20
if(e.key==="ArrowRight") playerX+=20
if(e.code==="Space") shoot()

playerX=Math.max(0,Math.min(740,playerX))

player.style.left=playerX+"px"

})

// tiro

function shoot(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.x=playerX+27
bullet.y=520

bullet.style.left=bullet.x+"px"
bullet.style.top=bullet.y+"px"

game.appendChild(bullet)

bullets.push(bullet)

// som tiro

let sound=document.getElementById("shootSound")
sound.currentTime=0
sound.play()

}

// inimigos

function spawnEnemy(){

let enemy=document.createElement("div")
enemy.className="enemy"

enemy.x=Math.random()*760
enemy.y=0

enemy.style.left=enemy.x+"px"
enemy.style.top=enemy.y+"px"

game.appendChild(enemy)

enemies.push(enemy)

}

setInterval(spawnEnemy,1200)

// explosão

function explosion(x,y){

let boom=document.createElement("div")
boom.className="explosion"

boom.style.left=x+"px"
boom.style.top=y+"px"

game.appendChild(boom)

setTimeout(()=>boom.remove(),300)

// som explosão

let sound=document.getElementById("explosionSound")
sound.currentTime=0
sound.play()

}

// loop jogo

function update(){

moveStars()

// tiros

bullets.forEach((b,i)=>{

b.y-=10
b.style.top=b.y+"px"

if(b.y<0){
b.remove()
bullets.splice(i,1)
}

})

// inimigos

enemies.forEach((e,ei)=>{

e.y+=3
e.style.top=e.y+"px"

if(e.y>580){

lives--
document.getElementById("lives").innerText=lives

e.remove()
enemies.splice(ei,1)

if(lives<=0){

document.getElementById("gameoverSound").play()

alert("GAME OVER")

location.reload()

}

}

// colisão

bullets.forEach((b,bi)=>{

if(
b.x < e.x+40 &&
b.x+6 > e.x &&
b.y < e.y+40 &&
b.y+15 > e.y
){

explosion(e.x,e.y)

e.remove()
b.remove()

enemies.splice(ei,1)
bullets.splice(bi,1)

score++
document.getElementById("score").innerText=score

}

})

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
